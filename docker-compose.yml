# ==========================================================
# App de control de gastos
# Funciona igual en local y en un NAS Synology con Docker.
#
#   Local:     docker compose up -d --build
#   Synology:  igual, o desde Container Manager (Proyecto)
#
# Accede a la app en:  http://<host>:${APP_PORT}  (por defecto 28080)
# ==========================================================

services:
  db:
    image: mysql:8.0
    container_name: gastos_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    healthcheck:
      # start_period largo: la 1ª inicialización en NAS (schema + usuarios) puede tardar varios minutos.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  backend:
    build:
      context: ./backend
    container_name: gastos_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1/health') ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  frontend:
    build:
      context: ./frontend
    container_name: gastos_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-28080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
